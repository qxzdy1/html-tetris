<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Garden | 写实花园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
            color: #e0e0e0;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #7cb342;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255,255,255,0.9);
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        #ui h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        #ui p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }
        #controls {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(20, 25, 20, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #controls button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.9);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.25s ease;
            pointer-events: auto;
        }
        #controls button:hover {
            background: rgba(124, 179, 66, 0.25);
            border-color: rgba(124, 179, 66, 0.5);
            transform: translateY(-2px);
        }
        #controls button.active {
            background: rgba(124, 179, 66, 0.4);
            border-color: rgba(124, 179, 66, 0.7);
        }
        #tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(10, 15, 10, 0.85);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 200;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 768px) {
            #controls {
                flex-wrap: wrap;
                justify-content: center;
                bottom: 16px;
                width: 90%;
            }
            #controls button {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            #ui h1 { font-size: 1.2rem; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <p>正在生成写实花园生态系统...</p>
    </div>

    <div id="ui">
        <h1>REALISTIC GARDEN</h1>
        <p>拖动旋转视角 · 滚轮缩放 · 点击植物互动<br>WSAD / 方向键漫游 · 空格暂停风动</p>
    </div>

    <div id="controls">
        <button id="btn-day" class="active">白昼</button>
        <button id="btn-sunset">黄昏</button>
        <button id="btn-night">夜晚</button>
        <button id="btn-season">切换季节</button>
        <button id="btn-wind">风动开关</button>
    </div>

    <div id="tooltip"></div>
    <div id="canvas-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
